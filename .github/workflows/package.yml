name: 'Publish Release'

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: frontend

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'PiDownloader v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          tauriScript: node frontend/node_modules/@tauri-apps/cli/tauri.js
          args: ${{ matrix.args }}

  create-update-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate update.json from latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read version from tauri.conf.json
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          TAG_NAME="v$VERSION"
          echo "Target tag: $TAG_NAME"

          # Get the release ID for the tag (which includes drafts)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases | jq -r --arg tag "$TAG_NAME" '.[] | select(.tag_name == $tag) | .id')
          echo "Release ID: $RELEASE_ID"

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Error: Release for tag $TAG_NAME not found."
            exit 1
          fi

          # Get the asset ID for latest.json in that release
          ASSET_ID=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets | jq -r '.[] | select(.name == "latest.json") | .id')
          echo "Asset ID: $ASSET_ID"

          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "Error: latest.json asset not found in release."
            exit 1
          fi

          # Download the asset content
          gh api repos/${{ github.repository }}/releases/assets/$ASSET_ID -H "Accept: application/octet-stream" > latest.json

          # Copy to update.json
          cp latest.json update.json

          # Upload update.json to the release
          gh release upload $TAG_NAME update.json --clobber --repo ${{ github.repository }}
