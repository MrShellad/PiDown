<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PiDownloader Extension</title>

<style>

:root {

    --bg-color: rgba(255,255,255,.55);
    --card-color: rgba(255,255,255,.40);

    --border-color: rgba(255,255,255,.35);

    --text-color: #111827;
    --text-secondary: #6b7280;

    --primary: #3b82f6;

    --success: #22c55e;
    --danger: #ef4444;

    --shadow:
        0 10px 40px rgba(0,0,0,.08);

    --blur: 18px;
}

[data-theme="dark"] {

    --bg-color: rgba(18,18,18,.55);
    --card-color: rgba(30,30,30,.45);

    --border-color: rgba(255,255,255,.08);

    --text-color: #f8fafc;
    --text-secondary: #9ca3af;

    --shadow:
        0 10px 40px rgba(0,0,0,.35);
}

* {
    box-sizing: border-box;
}

body {

    margin: 0;
    min-height: 100vh;

    font-family:
        Inter,
        "Segoe UI",
        sans-serif;

    color: var(--text-color);

    background:
        radial-gradient(
            circle at top left,
            rgba(96,165,250,.8),
            transparent 40%
        ),
        radial-gradient(
            circle at bottom right,
            rgba(139,92,246,.7),
            transparent 40%
        ),
        #f5f7fb;

    transition: .25s;
}

[data-theme="dark"] body,
html[data-theme="dark"] body {

    background:
        radial-gradient(
            circle at top left,
            rgba(37,99,235,.35),
            transparent 40%
        ),
        radial-gradient(
            circle at bottom right,
            rgba(124,58,237,.30),
            transparent 40%
        ),
        #0f172a;
}

.container {

    width: 100%;
    max-width: 960px;

    margin: 0 auto;
    padding: 40px 24px;
}

.header {

    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-bottom: 24px;
}

.logo {

    font-size: 32px;
    font-weight: 700;
}

.subtitle {

    color: var(--text-secondary);
    margin-top: 6px;
}

.theme-btn {

    width: 44px;
    height: 44px;

    border-radius: 50%;

    border: 1px solid var(--border-color);

    background: var(--card-color);

    backdrop-filter: blur(12px);

    cursor: pointer;

    color: var(--text-color);

    font-size: 18px;
}

.grid {

    display: grid;
    gap: 18px;
}

.card {

    background: var(--card-color);

    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));

    border: 1px solid var(--border-color);

    border-radius: 20px;

    padding: 22px;

    box-shadow: var(--shadow);
}

.card-title {

    font-size: 18px;
    font-weight: 600;

    margin-bottom: 18px;
}

.row {

    display: flex;
    align-items: center;
    justify-content: space-between;

    gap: 16px;

    margin-bottom: 14px;
}

.row:last-child {
    margin-bottom: 0;
}

.label {

    display: flex;
    flex-direction: column;
}

.label small {

    color: var(--text-secondary);
    margin-top: 4px;
}

input[type="text"],
input[type="number"] {

    width: 100%;

    padding: 12px 14px;

    border-radius: 12px;

    border: 1px solid var(--border-color);

    background: rgba(255,255,255,.15);

    color: var(--text-color);

    outline: none;
}

.field {
    margin-bottom: 16px;
}

.field label {

    display: block;

    margin-bottom: 8px;

    font-size: 14px;
    font-weight: 600;
}

.button-group {

    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.btn {

    border: none;

    cursor: pointer;

    border-radius: 12px;

    padding: 10px 16px;

    font-weight: 600;
}

.btn-primary {

    background: var(--primary);
    color: white;
}

.btn-secondary {

    background: rgba(255,255,255,.15);

    color: var(--text-color);

    border: 1px solid var(--border-color);
}

.badge {

    display: inline-flex;
    align-items: center;
    gap: 6px;

    padding: 6px 12px;

    border-radius: 999px;

    font-size: 13px;
    font-weight: 600;
}

.success {

    color: var(--success);

    background: rgba(34,197,94,.12);
}

.error {

    color: var(--danger);

    background: rgba(239,68,68,.12);
}

.switch {

    position: relative;

    width: 52px;
    height: 30px;
}

.switch input {
    display: none;
}

.slider {

    position: absolute;
    inset: 0;

    border-radius: 999px;

    background: #cbd5e1;

    transition: .2s;
}

.slider::before {

    content: "";

    position: absolute;

    width: 24px;
    height: 24px;

    top: 3px;
    left: 3px;

    border-radius: 50%;

    background: white;

    transition: .2s;
}

.switch input:checked + .slider {

    background: var(--primary);
}

.switch input:checked + .slider::before {

    transform: translateX(22px);
}

.version {

    color: var(--text-secondary);
}

@media (max-width: 768px) {

    .row {

        flex-direction: column;
        align-items: flex-start;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div>
            <div class="logo">PiDownloader</div>
            <div class="subtitle">
                Browser Extension Settings
            </div>
        </div>

        <button
            class="theme-btn"
            id="themeToggle">
            🌙
        </button>

    </div>

    <div class="grid">

        <div class="card">

            <div class="card-title">
                客户端连接
            </div>

            <div class="field">

                <label>连接状态</label>

                <span class="badge success">
                    ● 已连接
                </span>

            </div>

            <div class="field">

                <label>API 地址</label>

                <input
                    type="text"
                    value="http://127.0.0.1:16800">

            </div>

            <div class="button-group">

                <button class="btn btn-primary">
                    测试连接
                </button>

                <button class="btn btn-secondary">
                    恢复默认
                </button>

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                下载接管
            </div>

            <div class="row">

                <div class="label">
                    自动接管下载
                    <small>接管浏览器默认下载</small>
                </div>

                <label class="switch">
                    <input checked type="checkbox">
                    <span class="slider"></span>
                </label>

            </div>

            <div class="row">

                <div class="label">
                    大文件接管
                    <small>仅接管超过指定大小的文件</small>
                </div>

                <label class="switch">
                    <input checked type="checkbox">
                    <span class="slider"></span>
                </label>

            </div>

            <div class="field">

                <label>最小文件大小 (MB)</label>

                <input
                    type="number"
                    value="10">

            </div>

            <div class="field">

                <label>排除域名</label>

                <input
                    type="text"
                    placeholder="youtube.com, googlevideo.com">

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                浏览器集成
            </div>

            <div class="row">

                <div class="label">
                    右键菜单
                </div>

                <label class="switch">
                    <input checked type="checkbox">
                    <span class="slider"></span>
                </label>

            </div>

            <div class="row">

                <div class="label">
                    工具栏按钮
                </div>

                <label class="switch">
                    <input checked type="checkbox">
                    <span class="slider"></span>
                </label>

            </div>

            <div class="row">

                <div class="label">
                    下载前确认
                </div>

                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                关于
            </div>

            <div class="version">
                Extension Version: 1.0.0
            </div>

            <br>

            <div class="version">
                Client Version: 0.1.0
            </div>

            <br>

            <div class="button-group">

                <button class="btn btn-primary">
                    打开客户端
                </button>

                <button class="btn btn-secondary">
                    官方网站
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const root = document.documentElement;

const btn = document.getElementById("themeToggle");

function applySystemTheme() {

    if(root.dataset.theme !== "auto") {
        return;
    }

    const dark =
        window.matchMedia(
            "(prefers-color-scheme: dark)"
        ).matches;

    root.setAttribute(
        "data-theme",
        dark ? "dark" : "light"
    );
}

applySystemTheme();

btn.addEventListener("click", () => {

    const current =
        root.getAttribute("data-theme");

    root.setAttribute(
        "data-theme",
        current === "dark"
            ? "light"
            : "dark"
    );
});

</script>

</body>
</html>
